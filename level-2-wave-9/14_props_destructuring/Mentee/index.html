<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>13 — Props vs Destructuring (Mini Tasks)</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="card">
        <h1 class="title">13 — Props vs Destructuring (Mini Tasks)</h1>
        <p class="muted">
          Props = <b>an object passed into a function</b>.
          Destructuring = <b>pull properties out of an object</b>.
        </p>
      </header>

      <section class="card">
        <h2 class="section-title">Props (2 mini tasks)</h2>

        <div class="row">
          <button id="propsTask1Btn">Run Props Task 1</button>
          <p id="propsTask1Display" class="output">Waiting…</p>
        </div>

        <div class="row">
          <button id="propsTask2Btn">Run Props Task 2</button>
          <p id="propsTask2Display" class="output">Waiting…</p>
        </div>
      </section>

      <section class="card">
        <h2 class="section-title">Destructuring (2 mini tasks)</h2>

        <div class="row">
          <button id="destructTask1Btn">Run Destructuring Task 1</button>
          <p id="destructTask1Display" class="output">Waiting…</p>
        </div>

        <div class="row">
          <button id="destructTask2Btn">Run Destructuring Task 2</button>
        </div>

        <div id="destructTask2Container" class="grid"></div>
        <p id="statusText" class="muted small">Tip: open DevTools → Console too.</p>
      </section>
    </main>

    <script src="script.practice.js"></script>
  </body>
</html>
