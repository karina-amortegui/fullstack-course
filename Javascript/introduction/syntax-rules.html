<!-- JAVASCRIPT SYNTAX -->

<!-- 
JAVASCRIPT CODE RULES 
- Statements should end with a semicolon (;) - optional but recommended.
- Code blocks are enclosed within curly braces {}.
- Use camelCase for variable and function names (myVariable, fetchData()).
- Javascript is case-sensitive, so myVar and myvar are different variables.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- javascript will be here in <script> -->
    <script>
        // let myvariable - incorrect, not using camelCase
        let myVariable = "HELLO JAVASCRIPT!";
        console.log(myVariable);
    </script>
</body>
</html>
